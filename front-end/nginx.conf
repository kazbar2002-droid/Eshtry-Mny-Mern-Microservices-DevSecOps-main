server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /users {
        proxy_pass http://user-service:9001;
    }
    location /products {
        proxy_pass http://product-service:9000;
    }
    location /cart {
        proxy_pass http://cart-service:9003;
    }
    location / {
        try_files $uri /index.html;
    }
}
