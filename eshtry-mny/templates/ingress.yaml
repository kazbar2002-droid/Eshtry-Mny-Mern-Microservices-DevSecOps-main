apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshtry-mny-ingress
  namespace: eshtry-mny
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:

      # Frontend handles ALL UI routes
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

      # APIs only (optional improvement)
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 9001

      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: product-service
            port:
              number: 9000

      - path: /api/cart
        pathType: Prefix
        backend:
          service:
            name: cart-service
            port:
              number: 9003
